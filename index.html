<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>降臨装置</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e8e0d0;
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate {
    text-align: center;
    max-width: 360px;
    padding: 2rem;
  }
  .gate h1 {
    font-size: 1.5rem;
    font-weight: 300;
    color: #c9a84c;
    letter-spacing: 0.3em;
    margin-bottom: 2rem;
  }
  .gate p {
    font-size: 0.8rem;
    color: rgba(232,224,208,0.4);
    letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }
  .gate input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    color: #e8e0d0;
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    padding: 0.8rem 1rem;
    text-align: center;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
  }
  .gate input:focus {
    outline: none;
    border-color: rgba(201,168,76,0.5);
  }
  .gate input::placeholder {
    color: rgba(232,224,208,0.25);
  }
  .gate button {
    width: 100%;
    background: none;
    border: 1px solid rgba(201,168,76,0.3);
    color: #c9a84c;
    font-family: 'Noto Serif JP', serif;
    font-size: 0.85rem;
    padding: 0.7rem;
    cursor: pointer;
    letter-spacing: 0.2em;
    transition: all 0.3s;
  }
  .gate button:hover {
    background: rgba(201,168,76,0.1);
    border-color: #c9a84c;
  }
  .gate .error {
    color: #e05050;
    font-size: 0.75rem;
    margin-top: 0.8rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .gate .error.show { opacity: 1; }
  .gate .remember-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    font-size: 0.7rem;
    color: rgba(232,224,208,0.4);
  }
  .gate .remember-row input[type=checkbox] {
    width: auto;
    margin: 0;
  }
</style>
</head>
<body>
<div class="gate" id="gate">
  <h1>降臨装置</h1>
  <p>鍵を入力せよ</p>
  <input type="password" id="pw" placeholder="・・・" autofocus>
  <div class="remember-row">
    <input type="checkbox" id="remember" checked>
    <label for="remember">30日間記憶する</label>
  </div>
  <button onclick="unlock()">入る</button>
  <div class="error" id="err">鍵が違う</div>
</div>

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  try {
    const salt = b64ToArr(encPayload.salt);
    const iv = b64ToArr(encPayload.iv);
    const tag = b64ToArr(encPayload.tag);
    const data = b64ToArr(encPayload.data);
    
    // Combine data + tag for AES-GCM
    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);
    
    const key = await deriveKey(password, salt);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
    return new TextDecoder().decode(decrypted);
  } catch(e) {
    return null;
  }
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  const html = await decrypt(pw);
  if (html) {
    if (document.getElementById('remember').checked) {
      localStorage.setItem('korin-key', pw);
      localStorage.setItem('korin-key-time', Date.now().toString());
    }
    document.open();
    document.write(html);
    document.close();
  } else {
    document.getElementById('err').classList.add('show');
    setTimeout(() => document.getElementById('err').classList.remove('show'), 2000);
  }
}

document.getElementById('pw').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') unlock();
});

// Auto-unlock if remembered
(async () => {
  const saved = localStorage.getItem('korin-key');
  const savedTime = parseInt(localStorage.getItem('korin-key-time') || '0');
  if (saved && (Date.now() - savedTime) < 30 * 24 * 60 * 60 * 1000) {
    const html = await decrypt(saved);
    if (html) {
      document.open();
      document.write(html);
      document.close();
    }
  }
})();
</script>
